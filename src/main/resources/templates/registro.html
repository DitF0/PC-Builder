<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - PC Builder ESEG</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #0d1117 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .registro-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .registro-card h2 { color: #58a6ff; font-weight: 700; text-align: center; }
        .registro-card .subtitle { color: #8b949e; text-align: center; font-size: 0.9rem; margin-bottom: 2rem; }
        .form-label { color: #c9d1d9; font-weight: 500; }
        .form-control {
            background-color: #0d1117;
            border-color: #30363d;
            color: #c9d1d9;
        }
        .form-control:focus {
            background-color: #0d1117;
            border-color: #58a6ff;
            color: #c9d1d9;
            box-shadow: 0 0 0 3px rgba(88,166,255,0.15);
        }
        .btn-success { background-color: #238636; border-color: #238636; font-weight: 600; }
        .btn-success:hover { background-color: #2ea043; }
        .login-link { color: #58a6ff; text-decoration: none; }
        .login-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="registro-card">
    <h2>⚙️ PC Builder</h2>
    <p class="subtitle">Criar nova conta</p>

    <div th:if="${sucesso}" class="alert alert-success py-2 text-center small"
         th:text="${sucesso}"></div>
    <div th:if="${erro}" class="alert alert-danger py-2 text-center small"
         th:text="${erro}"></div>

    <form th:action="@{/registro}" method="post">
        <div class="mb-3">
            <label for="nome" class="form-label">Nome completo</label>
            <input type="text" class="form-control" id="nome" name="nome"
                   placeholder="Seu nome" required minlength="3">
        </div>
        <div class="mb-3">
            <label for="email" class="form-label">E-mail</label>
            <input type="email" class="form-control" id="email" name="email"
                   placeholder="seu@email.com" required>
        </div>
        <div class="mb-3">
            <label for="senha" class="form-label">Senha</label>
            <input type="password" class="form-control" id="senha" name="senha"
                   placeholder="Mínimo 6 caracteres" required minlength="6">
        </div>
        <div class="mb-4">
            <label for="confirmarSenha" class="form-label">Confirmar senha</label>
            <input type="password" class="form-control" id="confirmarSenha"
                   name="confirmarSenha" placeholder="Repita a senha" required>
        </div>
        <button type="submit" class="btn btn-success w-100 py-2">Criar Conta</button>
    </form>

    <div class="text-center mt-3" style="color:#8b949e; font-size:0.9rem">
        Já tem conta?
        <a href="/login" class="login-link">Fazer login</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
